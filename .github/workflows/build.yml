name: Build Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '"'"'21'"'"'
          distribution: '"'"'zulu'"'"'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: '"'"'${{ runner.os }}-gradle-${{ hashFiles('"'"'**/*.gradle*'"'"', '"'"'**/gradle.properties'"'"') }}'"'"'
          restore-keys: |
            '"'"'${{ runner.os }}-gradle-'"'"'

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: lapisworks-mod
          path: build/libs/*.jar
